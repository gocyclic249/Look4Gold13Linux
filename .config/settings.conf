# Look4Gold13 General Settings
# NIST SP 800-53 AU-13: Monitoring for Information Disclosure

# Output directory for scan results (relative to project root)
OUTPUT_DIR="output"

# Logging level: DEBUG, INFO, WARN, ERROR
LOG_LEVEL="INFO"

# Number of search results to retrieve per query (Brave Search)
SEARCH_RESULT_COUNT=10

# Number of days back to search (limits results to recent disclosures)
SEARCH_DAYS_BACK=7

# Brave Search dork mode: "security" uses AU-13 disclosure dorks, "raw" uses plain keyword
BRAVE_DORK_MODE="security"

# xAI model for GenAI analysis
XAI_MODEL="grok-4-1-fast-reasoning"

# xAI API timeout in seconds (web search makes responses slower)
XAI_TIMEOUT=300

# xAI live web search: let Grok research findings on the internet (true/false)
XAI_WEB_SEARCH=true

# AU-13 scan frequency label (for audit record metadata)
SCAN_FREQUENCY="on_demand"
